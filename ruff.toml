# Ruff 配置 - Python 代码规范
# 文档: https://docs.astral.sh/ruff/configuration/

# 目标 Python 版本
target-version = "py310"

# 行宽限制
line-length = 88

# 排除目录
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "*.pyc",
    ".ruff_cache",
]

# 只检查 backend 目录
src = ["backend"]

[lint]
# 启用的规则集
select = [
    "E",   # pycodestyle 错误
    "W",   # pycodestyle 警告
    "F",   # Pyflakes
    "I",   # isort 导入排序
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]

# 忽略的规则
ignore = [
    "E501",  # 行太长（由格式化工具处理）
    "B008",  # FastAPI File/Form 在参数默认值中是官方推荐用法
]

[lint.per-file-ignores]
# 脚本文件需要先修改 sys.path 才能导入项目模块
"backend/scripts/*" = ["E402"]

[lint.isort]
# 已知的第一方包
known-first-party = ["backend", "common", "core", "apps"]

[format]
# 使用双引号
quote-style = "double"

# 缩进使用空格
indent-style = "space"
